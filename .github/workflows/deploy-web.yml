name: Build & publish container (GHCR)

# Builds the full Next.js + FastAPI image (Dockerfile.web) and
# pushes it to GitHub Container Registry. Uses the built-in GITHUB_TOKEN, so no
# secrets need to be configured. The HuggingFace Space pulls this same image.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "api/**"
      - "web/**"
      - "artifacts/**"
      - "requirements.txt"
      - "Dockerfile.web"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/nexthire" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.web
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
