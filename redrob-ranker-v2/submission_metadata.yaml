# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "Local Windows box (Intel CPU)"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.13.9"
  os: "Windows 11 Enterprise"
  uses_gpu_for_inference: false        # CPU only — no GPU during ranking
  has_network_during_ranking: false    # no API calls during ranking (HF offline forced)
  # The one-time TF-IDF + LSA fit (~285s) is done OFFLINE and its result is
  # committed as a ~1 MB frozen index in artifacts/. The ranking step loads it
  # and finishes in ~25s; a from-scratch fallback (~5.9 min) exists but is not
  # used when the committed index matches the released pool.
  pre_computation_required: true
  pre_computation_time_minutes: 5      # offline: python precompute.py --backend lsa --gzip

# ============================================================================
# AI tools declaration (transparency only — not penalised)
# ============================================================================
ai_tools_used:
  - "Cursor"
  - "Claude"

ai_usage_summary: |
  Used AI assistants for architecture discussion, code review and drafting.
  All ranking logic (the Council of Nine, integrity layer, behavioural modifier,
  grounded reasoning) is original engineering. No candidate data was sent to any
  hosted LLM, and the ranking step makes zero network calls.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A "Council of Nine" (Navaratna) ensemble: nine interpretable sub-scorers, each
  mapping a strategic-judgement principle to a measurable feature. Career evidence
  and role identity dominate; the self-declared skills list is deliberately
  down-weighted and gated by an endorsement x duration x assessment trust factor
  (anti keyword-stuffer). A conservative integrity layer floors logically
  impossible honeypots; a bounded behavioural-availability modifier separates
  engaged from dormant twins. Hybrid retrieval (TF-IDF lexical + LSA dense, RRF
  fused) builds the shortlist offline and is committed as a ~1 MB frozen index so
  the ranking step is CPU-only, offline, and deterministic. A neural cross-encoder
  re-ranks the top-200 head with a deterministic feature fallback; a 3-band
  relevance gate + tier calibration optimises NDCG@10/50, MAP and P@10. Reasoning
  is fact-grounded and rank-calibrated. Runs in ~25s on the full 100K pool.

